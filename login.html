<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vixa Lead Finder — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b14;
      --surface:   #0e1220;
      --surface-2: #151a2e;
      --surface-3: #1c2240;
      --border:    rgba(255,255,255,0.07);
      --border-2:  rgba(255,255,255,0.13);
      --text:      #e8eaf0;
      --text-dim:  #9ca3af;
      --text-muted:#6b7280;
      --accent:    #6366f1;
      --accent-2:  #818cf8;
      --green:     #10b981;
      --red:       #ef4444;
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Background ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none;
    }
    .orb-1 {
      width: 700px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      top: -250px; left: -200px;
      animation: float 14s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation: float 18s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-25px); }
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.08);
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .login-logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
    }
    .login-logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 20px; color: #fff;
      box-shadow: 0 0 28px rgba(99,102,241,0.45);
    }
    .login-logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .login-logo-name { font-weight: 800; font-size: 20px; color: #fff; }
    .login-logo-sub  { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    /* ── Heading ── */
    .login-heading {
      font-size: 26px; font-weight: 800; color: #fff;
      margin-bottom: 6px; letter-spacing: -0.3px;
    }
    .login-sub {
      font-size: 14px; color: var(--text-dim);
      margin-bottom: 32px; font-weight: 400;
    }

    /* ── Form ── */
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .field-label {
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .field-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px; font-family: 'Outfit', sans-serif;
      color: var(--text); width: 100%;
      transition: all 0.2s; outline: none;
    }
    .field-input:focus {
      border-color: var(--accent);
      background: var(--surface-3);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .field-input::placeholder { color: var(--text-muted); }

    /* Password wrapper */
    .password-wrap { position: relative; }
    .password-wrap .field-input { padding-right: 44px; }
    .toggle-pass {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px;
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--accent-2); }

    /* ── Error ── */
    .error-box {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px; color: var(--red);
      margin-bottom: 16px;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ── Submit button ── */
    .login-btn {
      position: relative; width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none; border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px; font-weight: 700; color: #fff;
      cursor: pointer; overflow: hidden;
      transition: all 0.25s;
      box-shadow: 0 4px 24px rgba(99,102,241,0.4);
      margin-top: 8px;
    }
    .login-btn:hover    { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.55); }
    .login-btn:active   { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-btn-inner {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; z-index: 1;
    }
    .btn-shine {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .login-btn:hover .btn-shine { opacity: 1; }

    /* ── Footer note ── */
    .login-footer {
      margin-top: 28px; text-align: center;
      font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .login-footer svg { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">V</div>
        <div class="login-logo-text">
          <span class="login-logo-name">Vixa</span>
          <span class="login-logo-sub">Lead Finder</span>
        </div>
      </div>

      <!-- Heading -->
      <div class="login-heading">Welcome back</div>
      <div class="login-sub">Sign in to access your prospecting dashboard</div>

      <!-- Error -->
      <div class="error-box" id="error-box">Invalid username or password.</div>

      <!-- Form -->
      <form id="login-form" autocomplete="off">
        <div class="field">
          <label class="field-label" for="username">Username</label>
          <input
            type="text" id="username" name="username"
            class="field-input" placeholder="Enter your username"
            autocomplete="username" required
          />
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <div class="password-wrap">
            <input
              type="password" id="password" name="password"
              class="field-input" placeholder="Enter your password"
              autocomplete="current-password" required
            />
            <button type="button" class="toggle-pass" id="toggle-pass" title="Show/hide password">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <span class="login-btn-inner" id="btn-inner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign In
          </span>
          <div class="btn-shine"></div>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Access restricted to authorized Vixa members only
      </div>
    </div>
  </div>

  <script>
    // If already logged in, skip straight to the app
    fetch('/api/me', { credentials: 'include' })
      .then(r => r.json())
      .then(d => { if (d.loggedIn) window.location.replace('/'); })
      .catch(() => {});

    // Password toggle
    const passInput  = document.getElementById('password');
    const toggleBtn  = document.getElementById('toggle-pass');
    const eyeIcon    = document.getElementById('eye-icon');
    let showPass = false;
    toggleBtn.addEventListener('click', () => {
      showPass = !showPass;
      passInput.type = showPass ? 'text' : 'password';
      eyeIcon.innerHTML = showPass
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // Form submit
    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-inner');
    const errorBox = document.getElementById('error-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btnText.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             style="animation:spin 0.8s linear infinite">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Signing in...`;

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include',
        });
        const data = await res.json();

        if (data.success) {
          btnText.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Signed in!`;
          btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
          setTimeout(() => window.location.replace('/'), 600);
        } else {
          showError(data.error || 'Invalid credentials.');
        }
      } catch {
        showError('Cannot connect to server. Make sure the server is running.');
      }
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btnText.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In`;
    }
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
